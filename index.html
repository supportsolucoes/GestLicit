<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GestLicit — Controle Completo do Ciclo Licitatório</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 3 L41 9 L41 28 Q40 39 24 45 Q8 39 7 28 L7 9 Z" fill="#1E3A5F"/>
        <path d="M24 3 L41 9 L41 16 L7 16 L7 9 Z" fill="#B5790A"/>
        <line x1="7" y1="16" x2="41" y2="16" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
        <text x="24" y="32" text-anchor="middle" dominant-baseline="central"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="16" font-weight="700" fill="white" letter-spacing="1">GL</text>
      </svg>
      <div class="brand-name">GestLicit</div>
    </div>
    <p class="login-slogan">Controle Completo do Ciclo Licitatório</p>

    <div id="login-error" class="login-error hidden"></div>

    <form id="login-form">
      <div class="form-field" style="margin-bottom:14px;">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" required autocomplete="username" />
      </div>
      <div class="form-field" style="margin-bottom:6px;">
        <label for="login-password">Senha</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" required autocomplete="current-password" />
          <button type="button" class="btn-eye" id="btn-eye-login" tabindex="-1" title="Mostrar senha"></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:18px;" id="login-submit">Entrar</button>
    </form>
  </div>
</div>

<div id="change-password-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-brand">
      <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 3 L41 9 L41 28 Q40 39 24 45 Q8 39 7 28 L7 9 Z" fill="#1E3A5F"/>
        <path d="M24 3 L41 9 L41 16 L7 16 L7 9 Z" fill="#B5790A"/>
        <line x1="7" y1="16" x2="41" y2="16" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
        <text x="24" y="32" text-anchor="middle" dominant-baseline="central"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="16" font-weight="700" fill="white" letter-spacing="1">GL</text>
      </svg>
      <div class="brand-name">GestLicit</div>
    </div>
    <p class="login-slogan">Defina sua nova senha de acesso</p>
    <p style="font-size:13px; color:var(--gray-600); margin:-18px 0 24px; line-height:1.5;">
      Por segurança, crie uma senha pessoal antes de continuar.
    </p>

    <div id="change-pw-error" class="login-error hidden"></div>

    <form id="change-pw-form">
      <div class="form-field" style="margin-bottom:14px;">
        <label for="cp-nova">Nova senha</label>
        <div class="pw-wrap">
          <input type="password" id="cp-nova" required minlength="6" autocomplete="new-password" />
          <button type="button" class="btn-eye" id="btn-eye-cp1" tabindex="-1" title="Mostrar senha"></button>
        </div>
      </div>
      <div class="form-field" style="margin-bottom:6px;">
        <label for="cp-confirma">Confirmar nova senha</label>
        <div class="pw-wrap">
          <input type="password" id="cp-confirma" required minlength="6" autocomplete="new-password" />
          <button type="button" class="btn-eye" id="btn-eye-cp2" tabindex="-1" title="Mostrar senha"></button>
        </div>
      </div>
      <p style="font-size:12.5px; color:var(--gray-500); margin-top:10px;">Mínimo de 6 caracteres.</p>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:18px;">Definir nova senha</button>
    </form>
  </div>
</div>

<div id="app-shell" class="app-shell hidden">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 3 L41 9 L41 28 Q40 39 24 45 Q8 39 7 28 L7 9 Z" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
        <path d="M24 3 L41 9 L41 16 L7 16 L7 9 Z" fill="#B5790A"/>
        <line x1="7" y1="16" x2="41" y2="16" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
        <text x="24" y="32" text-anchor="middle" dominant-baseline="central"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="16" font-weight="700" fill="white" letter-spacing="1">GL</text>
      </svg>
      <div class="brand-name">GestLicit</div>
      <button class="icon-btn" data-action="ui.toggleSidebar" title="Recolher menu" id="btn-collapse-sidebar"></button>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
    <div class="sidebar-help">
      <a class="nav-item" href="manual.html" target="_blank" rel="noopener" data-tooltip="Ajuda / Manual">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Ajuda / Manual</span>
      </a>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <button class="icon-btn" id="btn-mobile-menu" data-action="ui.toggleMobileSidebar"></button>
      <div class="page-title" id="page-title">Dashboard</div>

      <div class="topbar-actions">
        <button class="icon-btn" id="btn-notifications" data-action="ui.toggleNotifications" title="Alertas">
          <span id="notif-dot" class="notif-dot hidden"></span>
        </button>
        <div id="notifications-dropdown" class="dropdown hidden"></div>

        <div class="user-chip" id="user-chip" data-action="ui.toggleUserMenu">
          <div class="user-avatar" id="user-avatar">U</div>
          <div>
            <div class="user-chip-name" id="user-chip-name">Usuário</div>
            <div class="user-chip-role" id="user-chip-role">Consulta</div>
          </div>
        </div>
        <div id="user-menu-dropdown" class="dropdown hidden"></div>
      </div>
    </header>

    <main id="page-container" class="page-container"></main>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast" class="toast"></div>
<div id="loading-overlay" class="loading-overlay hidden"><div class="spinner"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="./config.js"></script>
<script type="module" src="./main.js"></script>
</body>
</html>
